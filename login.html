<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Golden Icy Studio | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Exo+2:wght@100;200;300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{
  --gold:#c9a84c;--gold-l:#f0d47a;--gold-d:#7a5c1e;
  --ice:#a8dff5;--ice-l:#d6f0fb;--ice-d:#4aa8d0;
  --blk:#060810;--blk2:#0d1020;--blk3:#141828;--blk4:#1c2235;
  --wht:#f0f4ff;--glass:rgba(168,223,245,0.06);--gb:rgba(201,168,76,0.2);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--blk);
  color:var(--wht);
  font-family:'Exo 2',sans-serif;
  font-weight:200;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

/* ANIMATED BACKGROUND */
.bg{position:fixed;inset:0;z-index:0}
.bg-gradient{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 20% 50%, rgba(201,168,76,0.07) 0%, transparent 60%),
             radial-gradient(ellipse 60% 80% at 80% 50%, rgba(168,223,245,0.06) 0%, transparent 60%),
             var(--blk);
}
.bg-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(201,168,76,.03) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(201,168,76,.03) 1px,transparent 1px);
  background-size:55px 55px;
}
.orb{
  position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;
  animation:orbFloat 8s ease-in-out infinite;
}
.orb1{width:400px;height:400px;background:rgba(201,168,76,0.06);top:-10%;left:-10%;animation-delay:0s}
.orb2{width:350px;height:350px;background:rgba(168,223,245,0.05);bottom:-10%;right:-5%;animation-delay:-4s}
.orb3{width:200px;height:200px;background:rgba(201,168,76,0.04);top:50%;left:60%;animation-delay:-2s}
@keyframes orbFloat{
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-30px) scale(1.05)}
}

/* SCAN LINE */
.scanline{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
}

/* MAIN CONTAINER */
.container{
  position:relative;z-index:10;
  width:100%;max-width:480px;
  padding:1.5rem;
  animation:containerIn .8s cubic-bezier(.22,1,.36,1) both;
}
@keyframes containerIn{
  from{opacity:0;transform:translateY(40px) scale(.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* LOGO */
.logo{
  text-align:center;margin-bottom:2.5rem;
  animation:fadeDown .6s .1s both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.logo-mark{
  display:inline-flex;align-items:center;gap:.8rem;
  text-decoration:none;margin-bottom:.8rem;
}
.logo-box{
  width:48px;height:48px;background:#000;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid var(--gold);
  box-shadow:0 0 24px rgba(201,168,76,.4),inset 0 0 10px rgba(201,168,76,.05);
}
.logo-box span{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:#fff}
.logo-text{display:flex;flex-direction:column;line-height:1.1;text-align:left}
.logo-text .g{font-family:'Cormorant Garamond',serif;font-size:.6rem;letter-spacing:.4em;color:var(--gold-l);text-transform:uppercase}
.logo-text .s{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.2em;color:var(--ice-l)}
.logo-tagline{
  font-family:'Cormorant Garamond',serif;font-size:.8rem;font-style:italic;
  color:var(--ice);opacity:.6;letter-spacing:.2em;display:block;
}

/* CARD */
.card{
  background:rgba(13,16,32,0.85);
  border:1px solid rgba(201,168,76,0.15);
  backdrop-filter:blur(24px);
  position:relative;overflow:hidden;
  padding:2.5rem 2.5rem;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),var(--ice),transparent);
}
.card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(168,223,245,0.3),transparent);
}

/* CORNER DECORATIONS */
.corner{position:absolute;width:20px;height:20px}
.corner-tl{top:0;left:0;border-top:1px solid var(--gold);border-left:1px solid var(--gold)}
.corner-tr{top:0;right:0;border-top:1px solid var(--gold);border-right:1px solid var(--gold)}
.corner-bl{bottom:0;left:0;border-bottom:1px solid var(--gold);border-left:1px solid var(--gold)}
.corner-br{bottom:0;right:0;border-bottom:1px solid var(--gold);border-right:1px solid var(--gold)}

/* TABS */
.tabs{display:flex;gap:0;margin-bottom:2rem;border-bottom:1px solid rgba(255,255,255,.06)}
.tab{
  flex:1;padding:.85rem;text-align:center;cursor:pointer;
  font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;
  opacity:.4;transition:all .3s;border-bottom:2px solid transparent;
  font-family:'Exo 2',sans-serif;font-weight:400;
  background:none;border-top:none;border-left:none;border-right:none;
  color:var(--wht);
}
.tab.active{opacity:1;color:var(--gold-l);border-bottom:2px solid var(--gold)}
.tab:hover:not(.active){opacity:.7}

/* PANELS */
.panel{display:none}
.panel.active{display:block;animation:panelIn .3s ease both}
@keyframes panelIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}

/* FORM */
.form-group{margin-bottom:1.3rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
label{
  display:block;font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--gold-l);opacity:.7;margin-bottom:.5rem;
}
input,select{
  width:100%;background:rgba(255,255,255,0.04);
  border:1px solid rgba(201,168,76,0.2);
  color:var(--wht);font-family:'Exo 2',sans-serif;font-weight:300;font-size:.85rem;
  padding:.8rem 1rem;outline:none;transition:all .3s;
  -webkit-appearance:none;appearance:none;
}
input::placeholder{color:rgba(240,244,255,.25);font-size:.8rem}
input:focus,select:focus{
  border-color:var(--gold);
  background:rgba(201,168,76,0.06);
  box-shadow:0 0 20px rgba(201,168,76,.1);
}
select option{background:var(--blk2);color:var(--wht)}
.input-pw{position:relative}
.input-pw input{padding-right:3rem}
.toggle-pw{
  position:absolute;right:.8rem;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--gold-l);
  opacity:.5;font-size:1rem;transition:opacity .2s;padding:0;
}
.toggle-pw:hover{opacity:1}

/* FIELD ERROR */
.field-error{
  font-size:.62rem;color:#ff6b6b;margin-top:.4rem;
  letter-spacing:.05em;display:none;
}
.field-error.show{display:block}
input.error{border-color:rgba(255,107,107,.5) !important}

/* FORGOT */
.forgot{
  text-align:right;margin-bottom:1.2rem;
  font-size:.65rem;color:var(--gold-l);opacity:.6;
  cursor:pointer;text-decoration:none;
  transition:opacity .2s;display:block;
}
.forgot:hover{opacity:1;text-decoration:underline}

/* BUTTON */
.btn-gold{
  width:100%;padding:1rem;
  background:linear-gradient(135deg,var(--gold-d),var(--gold));
  border:none;color:#000;
  font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.25em;
  cursor:pointer;transition:all .3s;position:relative;overflow:hidden;
}
.btn-gold::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  opacity:0;transition:opacity .3s;
}
.btn-gold:hover::before{opacity:1}
.btn-gold:hover{box-shadow:0 8px 30px rgba(201,168,76,.4);transform:translateY(-1px)}
.btn-gold:active{transform:translateY(0)}
.btn-gold span{position:relative;z-index:1}
.btn-gold:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* DIVIDER */
.divider{
  display:flex;align-items:center;gap:1rem;margin:1.2rem 0;
  font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.25);
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
}

/* FOOTER TEXT */
.auth-footer{
  text-align:center;font-size:.7rem;opacity:.45;margin-top:1rem;
}
.auth-footer a{color:var(--gold-l);cursor:pointer;text-decoration:none;opacity:1}
.auth-footer a:hover{text-decoration:underline}

/* TOAST */
#toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);
  background:rgba(13,16,32,.96);border:1px solid rgba(201,168,76,.3);
  color:var(--wht);padding:.8rem 1.8rem;font-size:.75rem;letter-spacing:.1em;
  z-index:9999;transition:transform .4s cubic-bezier(.22,1,.36,1);
  max-width:90vw;text-align:center;
}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.error{border-color:rgba(255,107,107,.5);color:#ff8a8a}

/* BACK LINK */
.back-link{
  text-align:center;margin-top:1.5rem;
  font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;
  opacity:.4;
}
.back-link a{color:var(--ice);text-decoration:none;transition:opacity .2s}
.back-link a:hover{opacity:1}
.back-link a::before{content:'← '}

/* SECURITY BADGE */
.security{
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  margin-top:1.5rem;opacity:.3;font-size:.6rem;letter-spacing:.15em;
  text-transform:uppercase;
}
.security::before{content:'🔒'}

/* RESPONSIVE */
@media(max-width:520px){
  .container{padding:1rem}
  .card{padding:2rem 1.5rem}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="scanline"></div>

<div class="container">

  <!-- LOGO -->
  <div class="logo">
    <a href="index-1.html" class="logo-mark">
      <div class="logo-box"><span>GI</span></div>
      <div class="logo-text">
        <span class="g">Golden Icy</span>
        <span class="s">Studio</span>
      </div>
    </a>
    <span class="logo-tagline">Premium Beat Production</span>
  </div>

  <!-- CARD -->
  <div class="card">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- ── LOGIN PANEL ── -->
    <div class="panel active" id="panel-login">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="your@email.com"/>
        <div class="field-error" id="err-login-email"></div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-pw">
          <input type="password" id="login-pw" placeholder="Enter your password"/>
          <button class="toggle-pw" onclick="togglePw('login-pw',this)" type="button">👁</button>
        </div>
        <div class="field-error" id="err-login-pw"></div>
      </div>
      <a href="#" class="forgot" onclick="showForgot(event)">Forgot password?</a>
      <button class="btn-gold" onclick="doLogin()" id="btn-login"><span>Login to Account</span></button>
      <div class="divider">or</div>
      <div class="auth-footer">Don't have an account? <a onclick="switchTab('signup')">Sign Up Free</a></div>
    </div>

    <!-- ── SIGNUP PANEL ── -->
    <div class="panel" id="panel-signup">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="su-fname" placeholder="First name"/>
          <div class="field-error" id="err-su-fname"></div>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="su-lname" placeholder="Last name"/>
          <div class="field-error" id="err-su-lname"></div>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="su-email" placeholder="your@email.com"/>
        <div class="field-error" id="err-su-email"></div>
      </div>
      <div class="form-group">
        <label>Phone (WhatsApp)</label>
        <input type="tel" id="su-phone" placeholder="071 000 0000"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-pw">
          <input type="password" id="su-pw" placeholder="Min. 8 characters"/>
          <button class="toggle-pw" onclick="togglePw('su-pw',this)" type="button">👁</button>
        </div>
        <div class="field-error" id="err-su-pw"></div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="su-pw2" placeholder="Confirm password"/>
        <div class="field-error" id="err-su-pw2"></div>
      </div>
      <div class="form-group">
        <label>I Am A</label>
        <select id="su-role">
          <option value="">Select your role...</option>
          <option>Recording Artist</option>
          <option>Producer</option>
          <option>DJ</option>
          <option>Content Creator</option>
          <option>Filmmaker</option>
          <option>Other</option>
        </select>
        <div class="field-error" id="err-su-role"></div>
      </div>
      <button class="btn-gold" onclick="doSignup()" id="btn-signup"><span>Create Free Account</span></button>
      <div class="auth-footer" style="margin-top:.8rem">Already have an account? <a onclick="switchTab('login')">Login</a></div>
    </div>

    <!-- ── FORGOT PASSWORD PANEL ── -->
    <div class="panel" id="panel-forgot">
      <p style="font-size:.8rem;opacity:.6;margin-bottom:1.5rem;line-height:1.6;letter-spacing:.03em">
        Enter your email address and we'll send your account details.
      </p>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="forgot-email" placeholder="your@email.com"/>
        <div class="field-error" id="err-forgot-email"></div>
      </div>
      <button class="btn-gold" onclick="doForgot()" id="btn-forgot"><span>Send Reset Info</span></button>
      <div class="auth-footer" style="margin-top:1rem"><a onclick="switchTab('login')">← Back to Login</a></div>
    </div>

  </div><!-- /card -->

  <div class="back-link"><a href="index-1.html">Return to site</a></div>
  <div class="security">Your data is stored locally and securely</div>

</div><!-- /container -->

<div id="toast"></div>

<script>
// ── EMAILJS CONFIG (from index.html) ──
const EJS_PUBLIC_KEY   = 'qVuFsUjAn-gEa51LB';
const EJS_SERVICE_ID   = 'service_ohqyxeq';
const EJS_TPL_WELCOME  = 'template_k8guy7i';
const EJS_TPL_PAYMENT  = 'template_c07gfh6';
const STUDIO_EMAIL     = 'goldenicystudio@gmail.com';

function ejsReady(){ return EJS_PUBLIC_KEY !== 'YOUR_PUBLIC_KEY'; }

// ── EMAILJS INIT ──
document.addEventListener('DOMContentLoaded', function(){
  if(ejsReady()) emailjs.init({publicKey: EJS_PUBLIC_KEY});
});

// ── SESSION: if already logged in, redirect ──
(function checkSession(){
  try{
    const s = sessionStorage.getItem('gis_session');
    if(s){
      const u = JSON.parse(s);
      if(u && u.email){
        const dest = new URLSearchParams(location.search).get('redirect') || 'index-1.html';
        location.replace(dest);
      }
    }
  }catch(e){}
})();

// ── TAB SWITCHING ──
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab) && document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  clearAllErrors();
}

function showForgot(e){
  e.preventDefault();
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-forgot').classList.add('active');
}

// ── UTILITIES ──
function isValidEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

function fieldErr(id, msg){
  const el = document.getElementById(id);
  const err = document.getElementById('err-'+id);
  if(el){ el.classList.add('error'); }
  if(err){ err.textContent=msg; err.classList.add('show'); }
}

function clearAllErrors(){
  document.querySelectorAll('.field-error').forEach(e=>{ e.classList.remove('show'); e.textContent=''; });
  document.querySelectorAll('input, select').forEach(e=>e.classList.remove('error'));
}

function togglePw(id, btn){
  const i = document.getElementById(id);
  i.type = i.type==='password'?'text':'password';
  btn.textContent = i.type==='password'?'👁':'🙈';
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  const isErr = msg.startsWith('⚠️')||msg.startsWith('❌');
  t.classList.toggle('error', isErr);
  t.classList.add('show');
  setTimeout(()=>{ t.classList.remove('show'); t.classList.remove('error'); }, 3500);
}

// ── REDIRECT AFTER LOGIN ──
function redirectAfterLogin(){
  const dest = new URLSearchParams(location.search).get('redirect') || 'index-1.html';
  setTimeout(()=>location.replace(dest), 800);
}

// ── LOGIN ──
function doLogin(){
  clearAllErrors();
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-pw').value;
  let ok = true;

  if(!email){ fieldErr('login-email','Email is required'); ok=false; }
  else if(!isValidEmail(email)){ fieldErr('login-email','Enter a valid email address'); ok=false; }
  if(!pw){ fieldErr('login-pw','Password is required'); ok=false; }
  if(!ok) return;

  const stored = JSON.parse(localStorage.getItem('gis_users')||'[]');
  const user = stored.find(u=>u.email===email && u.pw===pw);

  if(user){
    sessionStorage.setItem('gis_session', JSON.stringify(user));
    localStorage.setItem('gis_current', JSON.stringify(user));
    toast('✓ Welcome back, '+user.fname+'!');
    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.querySelector('span').textContent = 'Redirecting...';
    redirectAfterLogin();
  } else {
    fieldErr('login-email','Invalid email or password');
    fieldErr('login-pw','Invalid email or password');
  }
}

// ── SIGNUP ──
function doSignup(){
  clearAllErrors();
  const fn   = document.getElementById('su-fname').value.trim();
  const ln   = document.getElementById('su-lname').value.trim();
  const em   = document.getElementById('su-email').value.trim();
  const ph   = document.getElementById('su-phone').value.trim();
  const pw   = document.getElementById('su-pw').value;
  const pw2  = document.getElementById('su-pw2').value;
  const role = document.getElementById('su-role').value;
  let ok = true;

  if(!fn){ fieldErr('su-fname','First name is required'); ok=false; }
  if(!ln){ fieldErr('su-lname','Last name is required'); ok=false; }
  if(!em){ fieldErr('su-email','Email is required'); ok=false; }
  else if(!isValidEmail(em)){ fieldErr('su-email','Enter a valid email'); ok=false; }
  if(!pw){ fieldErr('su-pw','Password is required'); ok=false; }
  else if(pw.length<8){ fieldErr('su-pw','Password must be at least 8 characters'); ok=false; }
  if(!pw2){ fieldErr('su-pw2','Please confirm your password'); ok=false; }
  else if(pw!==pw2){ fieldErr('su-pw2','Passwords do not match'); ok=false; }
  if(!role){ fieldErr('su-role','Please select your role'); ok=false; }
  if(!ok) return;

  const stored = JSON.parse(localStorage.getItem('gis_users')||'[]');
  if(stored.find(u=>u.email===em)){
    fieldErr('su-email','This email is already registered');
    return;
  }

  const user = {fname:fn, lname:ln, email:em, phone:ph, pw, role, purchases:[], joinedAt: new Date().toISOString()};
  stored.push(user);
  localStorage.setItem('gis_users', JSON.stringify(stored));
  sessionStorage.setItem('gis_session', JSON.stringify(user));
  localStorage.setItem('gis_current', JSON.stringify(user));

  sendWelcomeEmail(user);
  toast('✓ Account created! Welcome, '+fn+'!');

  const btn = document.getElementById('btn-signup');
  btn.disabled = true;
  btn.querySelector('span').textContent = 'Redirecting...';
  redirectAfterLogin();
}

// ── FORGOT PASSWORD ──
function doForgot(){
  clearAllErrors();
  const email = document.getElementById('forgot-email').value.trim();
  if(!email){ fieldErr('forgot-email','Email is required'); return; }
  if(!isValidEmail(email)){ fieldErr('forgot-email','Enter a valid email address'); return; }

  const stored = JSON.parse(localStorage.getItem('gis_users')||'[]');
  const user = stored.find(u=>u.email===email);

  if(!user){
    fieldErr('forgot-email','No account found with this email');
    return;
  }

  // Send via EmailJS
  if(ejsReady()){
    emailjs.send(EJS_SERVICE_ID, EJS_TPL_WELCOME, {
      to_email:  email,
      to_name:   user.fname+' '+user.lname,
      from_name: 'Golden Icy Studio',
      reply_to:  STUDIO_EMAIL,
      message:   'Your account email: '+email+'. Please contact the studio to reset your password at: '+STUDIO_EMAIL
    }, {publicKey: EJS_PUBLIC_KEY});
  }

  toast('✓ Account details sent to '+email);
  setTimeout(()=>switchTab('login'), 2000);
}

// ── WELCOME EMAIL (exact from index.html) ──
function sendWelcomeEmail(user){
  if(!ejsReady()) return;
  emailjs.send(EJS_SERVICE_ID, EJS_TPL_WELCOME, {
    to_email:  user.email,
    to_name:   user.fname+' '+user.lname,
    from_name: 'Golden Icy Studio',
    reply_to:  STUDIO_EMAIL,
    message:   'Welcome to Golden Icy Studio! Your account has been created. Browse our beats and start creating.'
  }, {publicKey: EJS_PUBLIC_KEY});
}

// ── PAYMENT NOTIFICATION (from index.html) ──
function sendPaymentNotification(buyerName, buyerEmail, method, ref, items, total){
  if(!ejsReady()) return;
  const opts = {publicKey: EJS_PUBLIC_KEY};
  // Email to studio owner
  emailjs.send(EJS_SERVICE_ID, EJS_TPL_PAYMENT, {
    to_email:    STUDIO_EMAIL,
    to_name:     'Golden Icy Studio',
    from_name:   buyerName,
    reply_to:    buyerEmail,
    buyer_name:  buyerName,
    buyer_email: buyerEmail,
    pay_method:  method,
    order_ref:   ref,
    order_items: items,
    order_total: '$'+total,
    message:     'New payment received via '+method+'. Order: '+ref+'. Items: '+items+'. Total: $'+total+'. Please verify payment and send the license.'
  }, opts);
  // Confirmation email to buyer
  emailjs.send(EJS_SERVICE_ID, EJS_TPL_PAYMENT, {
    to_email:    buyerEmail,
    to_name:     buyerName,
    from_name:   'Golden Icy Studio',
    reply_to:    STUDIO_EMAIL,
    buyer_name:  buyerName,
    buyer_email: buyerEmail,
    pay_method:  method,
    order_ref:   ref,
    order_items: items,
    order_total: '$'+total,
    message:     'Thank you for your payment! Your order ref is '+ref+'. We will verify your payment and send your license to this email within 24 hours. Contact us on +263 71 830 8334 for quick delivery.'
  }, opts);
}

// ── ENTER KEY SUPPORT ──
document.addEventListener('keydown', function(e){
  if(e.key !== 'Enter') return;
  const panel = document.querySelector('.panel.active');
  if(!panel) return;
  if(panel.id === 'panel-login') doLogin();
  else if(panel.id === 'panel-signup') doSignup();
  else if(panel.id === 'panel-forgot') doForgot();
});
</script>
